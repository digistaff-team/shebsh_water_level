name: Daily water level snapshot

on:
  schedule:
    # 09:00 UTC = 12:00 МСК (Краснодар, UTC+3)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-history
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and append water level
        env:
          PROTALK_BOT_TOKEN: ${{ secrets.PROTALK_BOT_TOKEN }}
          PROTALK_BOT_ID: ${{ secrets.PROTALK_BOT_ID }}
        run: node scripts/fetch-water-data.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/history.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/history.json
          git commit -m "chore: append water level snapshot ($(date -u +%Y-%m-%d))"
          git push
